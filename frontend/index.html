<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eitan — AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">🛡️ <span>Eitan</span></div>
      <div class="sidebar-tagline">AI Recovery Companion</div>

      <p class="sidebar-label">Modules</p>

      <button class="module-btn active" data-module="guide">
        <span class="module-icon">📋</span>
        <div>
          <div class="module-name">Benefits Guide</div>
          <div class="module-desc">Rights &amp; allowances</div>
        </div>
      </button>

      <button class="module-btn" data-module="mind">
        <span class="module-icon">🧠</span>
        <div>
          <div class="module-name">Mood Check-in</div>
          <div class="module-desc">Mental wellness</div>
        </div>
      </button>

      <button class="module-btn" data-module="ptsd">
        <span class="module-icon">🕊️</span>
        <div>
          <div class="module-name">PTSD Support</div>
          <div class="module-desc">Trauma-aware companion</div>
        </div>
      </button>

      <!-- ── MEMORY SECTION ─────────────────────────────────── -->
      <div class="sidebar-divider"></div>
      <p class="sidebar-label">Memory</p>

      <!-- Memory On/Off toggle -->
      <div class="memory-toggle-row">
        <div class="memory-toggle-info">
          <span class="memory-toggle-icon">🧬</span>
          <div>
            <div class="memory-toggle-label">Session Memory</div>
            <div class="memory-toggle-desc" id="memory-status-text">Off — AI forgets after session</div>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="memory-enabled-toggle" />
          <span class="toggle-track"></span>
        </label>
      </div>

      <!-- Storage mode selector -->
      <div class="memory-mode-row" id="memory-mode-row" style="display:none">
        <button class="mode-btn active" id="mode-btn-api" data-mode="api">☁️ API</button>
        <button class="mode-btn" id="mode-btn-local" data-mode="local">💻 Local</button>
      </div>

      <!-- View history button -->
      <button class="btn-memory-history" id="btn-memory-history" style="display:none">
        📖 View Session History
      </button>

      <div class="spacer"></div>

      <div class="backend-row">
        <label>Model</label>
        <select id="model-select">
          <option value="nvidia">☁️ NVIDIA — Llama 4 Maverick</option>
          <option value="local">💻 Local — LM Studio</option>
        </select>
      </div>

      <div class="backend-row">
        <label>Backend URL (blank = same origin)</label>
        <input id="backend-url" type="url" placeholder="http://localhost:3000" value="" />
      </div>

      <button id="btn-clear" class="btn-secondary">🗑 Clear conversation</button>
    </aside>

    <!-- Main Chat -->
    <main class="chat-main">
      <header class="chat-header">
        <div>
          <div class="chat-title" id="chat-title">Benefits Navigator</div>
          <div class="chat-subtitle" id="chat-subtitle">Ask about your IDF rights, allowances &amp; healthcare</div>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <div class="memory-badge" id="memory-badge" style="display:none">🧬 Memory On</div>
          <div class="header-badge" id="connection-badge">⚡ Dev Mode</div>
        </div>
      </header>

      <div id="messages" class="messages-area">
        <!-- welcome injected by JS -->
      </div>

      <div id="typing" class="typing-wrap" style="display:none">
        <div class="ai-bubble typing-bubble">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="input-area">
        <textarea id="msg-input" placeholder="Type your message… (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
        <button id="btn-mic" class="mic-btn" title="Hold or click to record">🎤</button>
        <button id="btn-send" class="send-btn" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <!-- ── HISTORY DRAWER ─────────────────────────────────────────────────── -->
  <div id="history-overlay" class="history-overlay" style="display:none"></div>
  <aside id="history-drawer" class="history-drawer">
    <div class="history-drawer-header">
      <div>
        <div class="history-drawer-title">🧬 Session Memory</div>
        <div class="history-drawer-sub">You control what the AI remembers</div>
      </div>
      <button class="history-close-btn" id="btn-close-history">✕</button>
    </div>

    <!-- Period tabs -->
    <div class="history-tabs">
      <button class="history-tab active" data-period="week">This Week</button>
      <button class="history-tab" data-period="month">This Month</button>
      <button class="history-tab" data-period="all">All Time</button>
    </div>

    <div id="history-list" class="history-list">
      <div class="history-empty">No sessions yet. Start chatting to build memory.</div>
    </div>

    <div class="history-footer">
      <button class="btn-danger-outline" id="btn-delete-all-memory">🗑 Delete All Memory</button>
    </div>
  </aside>

  <script src="memory-local.js"></script>
  <script src="app.js"></script>
</body>
</html>
